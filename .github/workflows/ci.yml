name: Java CI Pipeline

on:
push:
branches:
  - main

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup JDK 21
    uses: actions/setup-java@v4
    with:
      java-version: '21'
      distribution: 'temurin'

  - name: Build with Maven
    run: mvn clean package

  - name: Run Tests
    run: mvn test

